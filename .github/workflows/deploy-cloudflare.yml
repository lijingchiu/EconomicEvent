name: Deploy to Cloudflare

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Back up D1 before migration
        run: npx wrangler d1 export us-economic-events --remote --skip-confirmation --output us-economic-events-pre-deploy.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Preserve D1 backup
        uses: actions/upload-artifact@v4
        with:
          name: us-economic-events-pre-deploy-${{ github.run_id }}
          path: us-economic-events-pre-deploy.sql
          if-no-files-found: error
          retention-days: 7

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply us-economic-events --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
